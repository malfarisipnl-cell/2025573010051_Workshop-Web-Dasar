<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viepoint"
    content="width=device-width,
                initial-scale=1.0">       
    <title>Css Grid</title>
    <link rel="stylesheet"
          href="grid.css">
</head>
<body>  

<h1>demo css Grid</h1>

<!-- Grid 3 kolom sama rata-->
 <section class="grid-dasar">
    <div>item 1</div>
    <div>item 2</div>
    <div>item 3</div>
    <div>item 4</div>
    <div>item 5</div>
    <div>item 6</div>
 </section>

 <!-- Grid 12 kolom layout -->
  <section class="layout-halaman">
    <header class="l-header">
        Header</Header>
    <nav class="l-sidebar">
        sidenar</nav>
    <main class="l-konten">
        konten utama</main>
    <aside></aside>
    <footer class="l-footer">
        footer</footer>
    </section>
    
<!-- Grid responsif otomatis-->
 <section class="grid-auto">
    <div>A</div><div>B</div>
    <div>C</div><div>D</div>
    <div>E</div><div>F</div>
    <div>G</div><div>H</div>
 </section>

 <!-- Galeri dengan item spesial-->
  <section class="galeri">
    <div class="g-besar">
        foto utama
    </div>
    <div>foto 2</div>
    <div>foto 3</div>
    <div>foto 4</div>
    <div class="g-lebar">
        Banner panjang
    </div>
    <div>foto 6</div>    
 </section>

</body> 
</html>
