<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Layout Dashboard</title>
    <link rel="stylesheet" href="latihan-1.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <h1>Admin Dashboard</h1>
      </header>

      <!-- Sidebar -->
      <aside class="sidebar">
        <nav>
          <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Users</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Reports</a></li>
            <li><a href="#">Settings</a></li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="content">
        <!-- Statistik Cards -->
        <div class="statistik">
          <div class="kartu-statistik">
            <div class="tabel-area">
              <h3>Total Users</h3>
              <table>
                <tr>
                  <td>Active</td>
                  <td>1,250</td>
                </tr>
                <tr>
                  <td>Inactive</td>
                  <td>320</td>
                </tr>
              </table>
            </div>
            <div class="grafik-area">
              <div class="placeholder">Chart 1</div>
            </div>
          </div>

          <div class="kartu-statistik">
            <div class="tabel-area">
              <h3>Total Revenue</h3>
              <table>
                <tr>
                  <td>This Month</td>
                  <td>$45,000</td>
                </tr>
                <tr>
                  <td>Last Month</td>
                  <td>$38,000</td>
                </tr>
              </table>
            </div>
            <div class="grafik-area">
              <div class="placeholder">Chart 2</div>
            </div>
          </div>

          <div class="kartu-statistik">
            <div class="tabel-area">
              <h3>Orders</h3>
              <table>
                <tr>
                  <td>Completed</td>
                  <td>892</td>
                </tr>
                <tr>
                  <td>Pending</td>
                  <td>45</td>
                </tr>
              </table>
            </div>
            <div class="grafik-area">
              <div class="placeholder">Chart 3</div>
            </div>
          </div>

          <div class="kartu-statistik">
            <div class="tabel-area">
              <h3>Conversion Rate</h3>
              <table>
                <tr>
                  <td>Rate</td>
                  <td>3.45%</td>
                </tr>
                <tr>
                  <td>Target</td>
                  <td>5.00%</td>
                </tr>
              </table>
            </div>
            <div class="grafik-area">
              <div class="placeholder">Chart 4</div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
