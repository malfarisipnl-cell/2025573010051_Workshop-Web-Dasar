<!-- membuat tombol dengan 4 varian mengggunakan class: btn-primary, .btn-secondary, .btn-danger, .btn-outline -->

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Button</title>
    <link rel="stylesheet" href="latihan-1.css" />
  </head>

  <body>
    <h2>Buttons</h2>
    <br>
    <div class="container-btn">
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-danger">Danger</button>
      <button class="btn btn-outline">Outline</button>
    </div>

    <h2>Badges</h2>
    <br>
    <div class="container-badge">
      <span class="badge badge-success">Success</span>
      <span class="badge badge-warning">Warning</span>
      <span class="badge badge-error">Error</span>
    </div>

    <h2>Alert Boxes</h2>
    <br>
    <div class="container-alertBox">
      <p class="alert alert-success">✅ This is a success alert</p>
      <p class="alert alert-warning">⚠️ This is a warning alert</p>
      <p class="alert alert-error">❌ This is a error alert</p>
    </div>
  </body>
</html>
